<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="View nail designs from Nails by Tina."
    />
    <title>Nails by Tina | Gallery</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Poppins:wght@300;400;500;600&display=swap"

    />
  </head>
  <body>

        </div>

    <footer class="site-footer">
      <div class="container">
        <p>&copy; 2026 Nails by Tina. All rights reserved.</p>
      </div>
    </footer>
    <div class="lightbox" id="lightbox">
      <button
        class="lightbox-close"
        id="lightboxClose"
        aria-label="Close image viewer"
      >
        &times;
      </button>
      <img
        src=""
        alt="Expanded gallery image"
        class="lightbox-image"
        id="lightboxImage"
      />
    </div>

    <script src="script.js"></script>
  </body>
</html>
